<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Concert Event Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a0a2e 0%,#16213e 100%);color:#eee;line-height:1.6;padding:20px}
        header{background:linear-gradient(135deg,#9d0208 0%,#370617 100%);border-bottom:3px solid #ffd60a;padding:40px 20px;text-align:center}
        header h1{font-size:2.5rem;color:#fff;letter-spacing:2px;margin-bottom:10px}
        header p{color:#ffd60a;font-style:italic}
        .banner{max-width:900px;margin:30px auto;border:2px solid #ffd60a;border-radius:8px;overflow:hidden}
        .banner img{width:100%;height:300px;object-fit:cover;display:block}
        main{max-width:900px;margin:30px auto;background:rgba(22,33,62,0.9);border:2px solid #ffd60a;border-radius:8px;padding:35px}
        h2{color:#ffd60a;font-size:1.8rem;margin-bottom:20px;border-bottom:2px solid #ffd60a;padding-bottom:10px}
        h3{color:#fff;font-size:1.1rem;margin:20px 0 10px}
        .media-box{margin:25px 0}
        video,audio{width:100%;margin:10px 0;border:1px solid #ffd60a;border-radius:4px;background:#000}
        form{display:flex;flex-direction:column;gap:15px;margin-top:20px}
        .form-group{display:flex;flex-direction:column}
        label{color:#fff;font-weight:600;margin-bottom:6px;font-size:0.9rem}
        input[type="text"],input[type="email"],input[type="date"],select,textarea{padding:10px 12px;border:1px solid #ffd60a;background:rgba(0,0,0,0.5);color:#eee;border-radius:4px;font-size:0.95rem;transition:all 0.3s ease}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#fff;box-shadow:0 0 10px rgba(255,214,10,0.3)}
        textarea{resize:vertical;min-height:100px}
        .radio-group{display:flex;flex-wrap:wrap;gap:15px;margin-top:8px}
        .radio-group label{margin:0;color:#eee;font-weight:normal;display:flex;align-items:center}
        input[type="radio"]{margin-right:8px;accent-color:#ffd60a}
        .btn{background:linear-gradient(135deg,#9d0208 0%,#d62828 100%);color:#fff;border:none;padding:12px 30px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all 0.3s ease}
        .btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(157,2,8,0.4)}
        footer{text-align:center;padding:20px;color:#999;font-size:0.85rem;margin-top:40px}
        @media(max-width:768px){header h1{font-size:1.8rem}main{padding:20px}.radio-group{flex-direction:column;gap:10px}.btn{width:100%}}
    </style>
</head>
<body>
    <header>
        <h1>🎵 CONCERT EVENT REGISTRATION</h1>
        <p>"Feel the Music, Live the Moment"</p>
    </header>
    
    <div class="banner">
        <img src="banner.jpg" alt="Music Festival 2026 Banner">
    </div>
    
    <main>
        <section>
            <h2>Event Preview</h2>
            <h3>Festival Highlights</h3>
            <div class="media-box">
                <video controls poster="video-poster.jpg">
                    <source src="highlights.mp4" type="video/mp4">
                    Your browser does not support video.
                </video>
            </div>
            
            <h3>Ambient Music</h3>
            <div class="media-box">
                <audio controls>
                    <source src="anthem.mp3" type="audio/mpeg">
                    Your browser does not support audio.
                </audio>
                <small style="color:#999;display:block;margin-top:8px;">Experience the festival ambiance</small>
            </div>
        </section>
        
        <section style="margin-top:40px;">
            <h2>Ticket Registration</h2>
            <form>
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="ticket">Ticket Type *</label>
                        <select id="ticket" name="ticket" required>
                            <option value="">Select Ticket</option>
                            <option value="general">General Admission</option>
                            <option value="vip">VIP Package</option>
                            <option value="backstage">Backstage Access</option>
                            <option value="vip-camping">VIP Camping</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Genre Preference *</label>
                    <div class="radio-group">
                        <label><input type="radio" name="genre" value="rock" required> Rock</label>
                        <label><input type="radio" name="genre" value="pop"> Pop</label>
                        <label><input type="radio" name="genre" value="edm"> EDM</label>
                        <label><input type="radio" name="genre" value="indie"> Indie</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="special">Special Requests</label>
                    <textarea id="special" name="special" placeholder="Any dietary or accessibility needs..."></textarea>
                </div>
                <div class="form-group">
                    <label for="file">Upload ID</label>
                    <input type="file" id="file" name="file" accept=".pdf,.jpg,.png">
                </div>
                <button type="submit" class="btn">Book Tickets Now</button>
            </form>
        </section>
    </main>
    
    <footer>&copy; 2026 Concert Event Registration - Custom Media Version</footer>
</body>
</html>
