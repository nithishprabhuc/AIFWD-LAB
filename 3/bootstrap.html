<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Concert Event Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body{background:linear-gradient(135deg,#1a0a2e,#16213e);color:#eee;min-height:100vh}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,214,10,.08) 0%,transparent 50%);z-index:-1}
        .navbar{background:linear-gradient(180deg,#9d0208,#1a0a2e)!important;border-bottom:2px solid #ffd60a}
        .navbar-brand{color:#ffd60a!important;font-weight:700;font-size:1.3rem;letter-spacing:1px}
        .nav-link{color:rgba(255,255,255,.8)!important;transition:.3s ease}
        .nav-link:hover{color:#ffd60a!important}
        .banner-card{background:linear-gradient(135deg,#9d0208,#d62828);color:white;text-align:center;padding:40px 20px;border-radius:8px;margin-bottom:30px}
        .banner-card h1{font-size:2.2rem;font-weight:700;letter-spacing:2px;margin-bottom:10px}
        .card{background:rgba(22,33,62,.9);border:2px solid #ffd60a;color:#eee;border-radius:8px}
        .card-body{position:relative;z-index:1}
        .card h2{color:#ffd60a;font-size:1.8rem;margin-bottom:15px;border-bottom:2px solid #ffd60a;padding-bottom:10px}
        .card h5{color:#fff;font-weight:600;margin-top:15px;margin-bottom:10px}
        label{color:#fff;font-weight:600;font-size:.9rem}
        .form-control,.form-select{background:rgba(0,0,0,.5)!important;border:1px solid #ffd60a!important;color:#eee!important}
        .form-control:focus,.form-select:focus{border-color:#fff!important;box-shadow:0 0 10px rgba(255,214,10,.3)!important}
        textarea{min-height:100px}
        .form-check-input{accent-color:#ffd60a!important;cursor:pointer}
        .form-check-label{color:#eee;cursor:pointer;margin-left:8px}
        video,audio{width:100%;border:1px solid #ffd60a;border-radius:6px;margin:15px 0}
        .btn-primary{background:linear-gradient(135deg,#9d0208,#d62828)!important;border:none;padding:12px 30px;font-weight:600;text-transform:uppercase;letter-spacing:1px;transition:.3s ease}
        .btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(157,2,8,.5)}
        footer{background:#1a0a2e;border-top:2px solid #ffd60a;color:#999;text-align:center;padding:20px;margin-top:40px;font-size:.85rem}
        @media(max-width:768px){.banner-card h1{font-size:1.5rem}.card{padding:20px}}
        
        /* NEW: banner image */
        .banner-image{
            width:100%;
            max-height:320px;
            object-fit:cover;
            border-radius:8px;
            border:2px solid #ffd60a;
            margin-bottom:30px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">🎵 CONCERT</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-label="Toggle">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#media">Media</a></li>
                <li class="nav-item"><a class="nav-link" href="#form">Tickets</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <img src="banner.jpg" alt="Concert Banner" class="banner-image">

    <div class="banner-card">
        <h1>🎵 CONCERT EVENT REGISTRATION</h1>
        <p class="lead mb-0">Music Festival 2026 - Book Your Tickets</p>
    </div>

    <section id="media" class="mb-4">
        <div class="card">
            <div class="card-body">
                <h2>Event Preview</h2>

                <h5>Festival Highlights</h5>
                <div class="ratio ratio-16x9 mb-3">
                    <video controls>
                        <source src="highlights.mp4" type="video/mp4">
                        Your browser does not support video.
                    </video>
                </div>

                <h5>Ambient Music</h5>
                <audio controls class="w-100">
                    <source src="anthem.mp3" type="audio/mpeg">
                    Your browser does not support audio.
                </audio>

                <small style="color:#999;display:block;margin-top:10px;">Experience the festival ambiance</small>
            </div>
        </div>
    </section>

    <section id="form">
        <div class="card">
            <div class="card-body">
                <h2>Ticket Registration</h2>
                <form class="row g-3">
                    <div class="col-12">
                        <label for="name" class="form-label">Full Name *</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="dob" class="form-label">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" class="form-control" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="ticket" class="form-label">Ticket Type *</label>
                        <select id="ticket" name="ticket" class="form-select" required>
                            <option value="">Select Ticket</option>
                            <option value="general">General Admission</option>
                            <option value="vip">VIP Package</option>
                            <option value="backstage">Backstage Access</option>
                            <option value="vip-camping">VIP Camping</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Genre Preference *</label>
                        <div class="row g-2">
                            <div class="col-12 col-sm-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genre" id="rock" value="rock" required>
                                    <label class="form-check-label" for="rock">Rock</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genre" id="pop" value="pop">
                                    <label class="form-check-label" for="pop">Pop</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genre" id="edm" value="edm">
                                    <label class="form-check-label" for="edm">EDM</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="genre" id="indie" value="indie">
                                    <label class="form-check-label" for="indie">Indie</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="special" class="form-label">Special Requests</label>
                        <textarea id="special" name="special" class="form-control" placeholder="Any dietary or accessibility needs..."></textarea>
                    </div>
                    <div class="col-12">
                        <label for="file" class="form-label">Upload ID</label>
                        <input type="file" id="file" name="file" class="form-control" accept=".pdf,.jpg,.png">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Book Tickets Now</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</div>

<footer>&copy; 2024 Concert Event Registration Portal - Experiment 3: Bootstrap Responsive</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
